services:
  exceptionless:
    image: exceptionless/exceptionless:latest
    platform: linux/amd64
    container_name: exceptionless
    user: root
    restart: unless-stopped
    depends_on:
      - elasticsearch
      - redis
    ports:
      - "5200:8080"
    environment:
      EX_ConnectionStrings__Cache: provider=redis
      EX_ConnectionStrings__Elasticsearch: server=http://elasticsearch:9200
      EX_ConnectionStrings__MessageBus: provider=redis
      EX_ConnectionStrings__Queue: provider=redis
      EX_ConnectionStrings__Redis: redis,abortConnect=false
      EX_ConnectionStrings__Storage: provider=folder;path=/app/storage
      EX_RunJobsInProcess: "true"
      EX_EnableAccountCreation: "true"
      EX_ElasticsearchOptions__EnableMapperSizePlugin: "true"
    volumes:
      - exceptionless-storage:/app/storage
      - ./supervisord.conf:/etc/supervisord.conf:ro

  elasticsearch:
    build:
      context: .
      dockerfile: elasticsearch.Dockerfile
    container_name: exceptionless-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: exceptionless-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  log-bomb-service:
    build:
      context: ./test-microservice/LogBombService
      dockerfile: Dockerfile
    container_name: log-bomb-service
    restart: unless-stopped
    depends_on:
      - exceptionless
    ports:
      - "5050:8080"
    environment:
      Exceptionless__ApiKey: "${EXCEPTIONLESS_API_KEY:-YOUR_API_KEY}"
      Exceptionless__ServerUrl: http://exceptionless:8080

  telegram-notifier:
    build:
      context: ./telegram-notifier
      dockerfile: Dockerfile
    container_name: telegram-notifier
    restart: unless-stopped
    depends_on:
      - exceptionless
    ports:
      - "5001:5000"
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      EVENT_THRESHOLD: "${EVENT_THRESHOLD:-100}"
      POLL_INTERVAL: "${POLL_INTERVAL:-10}"
      COOLDOWN_SECONDS: "${COOLDOWN_SECONDS:-60}"
      ELASTICSEARCH_URL: http://elasticsearch:9200

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.24
    container_name: exceptionless-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

volumes:
  exceptionless-storage:
  elasticsearch-data:
  redis-data:
